{% extends 'base.html' %}

{% block content %}
<section class="catalog-header">
    <div class="container">
        <h2 class="mb-4">Часто задаваемые вопросы</h2>
        
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                {% for faq in faq_items %}
                <div class="faq-item">
                    <div class="faq-header">
                        <span>{{ faq.question }}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="faq-body">
                        <p>{{ faq.answer }}</p>
                    </div>
                </div>
                {% empty %}
                <div class="col-12">
                    <p class="text-muted">Пока нет вопросов. Задайте первый!</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
{% endblock %}
