{% extends 'base.html' %}

{% block content %}
<section class="catalog-header">
    <div class="container">
        <h2 class="mb-4">Контакты</h2>
        
        <div class="row">
            <div class="col-lg-6">
                <div class="contact-info">
                    <h5><i class="fas fa-info-circle me-2"></i>Контактная информация</h5>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <p><i class="fas fa-map-marker-alt me-2 text-primary"></i><strong>Адрес:</strong></p>
                            <p class="text-muted">г. Москва, ул. Автомобильная, 123</p>
                        </div>
                        <div class="col-md-6">
                            <p><i class="fas fa-phone me-2 text-primary"></i><strong>Телефон:</strong></p>
                            <p class="text-muted">+7 (495) 123-45-67</p>
                        </div>
                        <div class="col-md-6">
                            <p><i class="fas fa-envelope me-2 text-primary"></i><strong>Email:</strong></p>
                            <p class="text-muted">info@avto-sales.ru</p>
                        </div>
                        <div class="col-md-6">
                            <p><i class="fas fa-clock me-2 text-primary"></i><strong>Часы работы:</strong></p>
                            <p class="text-muted">Пн-Пт: 9:00 - 18:00<br>Сб-Вс: 10:00 - 16:00</p>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <h6><i class="fas fa-map-marked-alt me-2"></i>Как нас найти</h6>
                        <div class="ratio ratio-16x9 mt-2">
                            <iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3A1234567890abcdef&source=constructor" 
                                    width="100%" height="400" frameborder="0" allowfullscreen="true" aria-hidden="false" 
                                    tabindex="0"></iframe>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="contact-form">
                    <h5><i class="fas fa-comments me-2"></i>Форма обратной связи</h5>
                    <form id="contactForm" class="mt-3">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">Имя <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Телефон <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="phone" name="phone" required 
                                       placeholder="+7 (___) ___-__-__">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="subject" class="form-label">Тема сообщения</label>
                                <input type="text" class="form-control" id="subject" name="subject">
                            </div>
                            <div class="col-12 mb-3">
                                <label for="message" class="form-label">Сообщение <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                            </div>
                            <div class="col-12 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="agree" name="agree" required>
                                    <label class="form-check-label" for="agree">
                                        Согласен на обработку персональных данных
                                    </label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-paper-plane me-2"></i>Отправить сообщение
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const contactForm = document.getElementById('contactForm');
    
    contactForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Собираем данные формы
        const formData = new FormData(contactForm);
        const data = {
            name: formData.get('name'),
            email: formData.get('email'),
            phone: formData.get('phone'),
            subject: formData.get('subject') || 'Обратная связь',
            message: formData.get('message'),
            agree: formData.get('agree') === 'on'
        };
        
        // Проверка валидности формы
        if (!data.name || !data.email || !data.phone || !data.message || !data.agree) {
            alert('Пожалуйста, заполните все обязательные поля и подтвердите согласие на обработку данных.');
            return;
        }
        
        // Отправка сообщения в Telegram
        sendContactMessage(data);
        
        // Показываем сообщение об успехе
        alert('Спасибо за ваше сообщение! Мы свяжемся с вами в ближайшее время.');
        
        // Очищаем форму
        contactForm.reset();
    });
    
    function sendContactMessage(data) {
        // Здесь будет интеграция с Telegram API
        console.log('Сообщение от клиента:', data);
        
        // Пример отправки в Telegram бота (нужно будет настроить)
        // const telegramToken = 'YOUR_BOT_TOKEN';
        // const chatId = 'YOUR_CHAT_ID';
        // const message = `Новое сообщение!\n\nИмя: ${data.name}\nEmail: ${data.email}\nТелефон: ${data.phone}\nТема: ${data.subject}\nСообщение: ${data.message}`;
        
        // fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
        //     method: 'POST',
        //     headers: {
        //         'Content-Type': 'application/json',
        //     },
        //     body: JSON.stringify({
        //         chat_id: chatId,
        //         text: message
        //     })
        // });
    }
});
</script>
{% endblock %}
