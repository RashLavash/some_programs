services:

  collectstatic:
    build: .
    command:  python manage.py collectstatic --no-input
    volumes:
      - static:/app/static
      - media:/app/media
    env_file:
      - .env

  # Django API
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static:/app/static
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
    


  

  # Celery Worker
  celery-worker:
    build: .
    command: celery -A avto_sales worker -l info
    volumes:
      - .:/app
      - static:/app/static
      - media:/app/media
    
    depends_on:
      - redis


  # Redis
  redis:
    image: redis
    volumes:
      - redis-data:/data


  # Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/app/static
      - media:/app/media
    depends_on:
      - web

volumes:
  redis-data:
  static:
  media:
